<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Demo - DemandForecaster AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <!-- Navigation (same structure) -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">DemandForecaster AI</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Home</a></li>
                <li><a href="features.html" class="nav-link">Features</a></li>
                <li><a href="demo.html" class="nav-link">Demo</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="pricing.html" class="nav-link">Pricing</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    <!-- Demo Hero -->
    <section class="page-hero demo-hero">
        <div class="container">
            <h1>Live Interactive Demo</h1>
            <p>Experience the power of predictive demand forecasting in real-time</p>
        </div>
    </section>

    <!-- Interactive Demo Dashboard -->
    <section class="demo-dashboard section">
        <div class="container">
            <div class="dashboard-grid">
                <div class="dashboard-card forecast-chart">
                    <h3>Demand Forecast</h3>
                    <div class="chart-placeholder large">
                        <i class="fas fa-chart-line"></i>
                        <div>Interactive Forecast Chart</div>
                    </div>
                </div>
                <div class="dashboard-card metrics">
                    <h3>Key Metrics</h3>
                    <div class="metric-grid">
                        <div class="metric">
                            <div class="metric-number">95.2%</div>
                            <div>Accuracy</div>
                        </div>
                        <!-- More metrics -->
                    </div>
                </div>
            </div>
            
            <!-- Demo Controls -->
            <div class="demo-controls">
                <h3>Test Different Scenarios</h3>
                <div class="control-group">
                    <label>Product Category:</label>
                    <select>
                        <option>Electronics</option>
                        <option>Apparel</option>
                        <option>Grocery</option>
                    </select>
                </div>
                <!-- More controls -->
                <button class="btn btn-primary">Run Forecast</button>
            </div>
        </div>
    </section>

    <!-- Footer -->
</body>
</html>
